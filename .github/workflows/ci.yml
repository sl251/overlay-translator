name: CI

# PR 进 dev / main，以及向 main 直接 push（被 branch protection 限制后实际仅维护者）
# 都跑一遍 debug 构建做 smoke test。release 走单独的 release.yml。
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Stub local.properties
        run: |
          if [ ! -f local.properties ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi

      - name: Assemble debug
        run: ./gradlew --no-daemon assembleDebug lint

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
